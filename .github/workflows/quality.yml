name: Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zenos-memory-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit, route integration, and coverage gate
        run: npm run test:coverage

      - name: Local engine smoke
        run: npm run test:smoke

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=moderate

      - name: Production build
        run: npx next build --webpack
        env:
          ZENOS_MEMORY_STORAGE_MODE: drive-events
          ZENOS_MEMORY_ALLOW_INSECURE_DEV: "true"
          GOOGLE_OAUTH_CLIENT_ID: ci-placeholder
          GOOGLE_OAUTH_CLIENT_SECRET: ci-placeholder
          GOOGLE_OAUTH_REFRESH_TOKEN: ci-placeholder
          ZENOS_MEMORY_DRIVE_FOLDER_ID: ci-placeholder
